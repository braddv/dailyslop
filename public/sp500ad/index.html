<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/sp500ad/" />
    <title>S&P 500 Sector Bubble Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/sp500ad/styles.css" />
  </head>
  <body>
    <div class="glow"></div>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">S&P 500 market internals</p>
          <h1>Sector bubble map</h1>
          <p class="subhead" id="metricSubhead">Daily percent change by stock, grouped by sector.</p>
        </div>
        <div class="meta">
          <div class="meta-card">
            <span class="meta-label">As of</span>
            <span id="asOf" class="meta-value">--</span>
          </div>
          <div class="meta-card">
            <span class="meta-label">Cache</span>
            <span id="cache" class="meta-value">--</span>
          </div>
        </div>
      </header>

      <section class="controls">
        <div class="toggle-group" id="metricToggle">
          <button class="toggle-btn active" data-metric="changePercent">1D</button>
          <button class="toggle-btn" data-metric="perf1w">1W</button>
          <button class="toggle-btn" data-metric="perf1m">1M</button>
          <button class="toggle-btn" data-metric="perf3m">3M</button>
          <button class="toggle-btn" data-metric="pctFrom12wHigh">12W High</button>
          <button class="toggle-btn" data-metric="pctFrom52wHigh">52W High</button>
        </div>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All S&amp;P 500</button>
          <button class="filter-btn" data-filter="sectors">Sectors</button>
          <button class="filter-btn" data-filter="top50">Top 50</button>
          <button class="filter-btn" data-filter="top250">Top 250</button>
          <button class="filter-btn" data-filter="bottom250">Bottom 250</button>
          <button class="filter-btn" data-filter="xmag">XMAG</button>
          <button class="filter-btn" data-filter="mag7">MAG7</button>
          <button class="filter-btn" data-filter="dow">Dow Jones</button>
        </div>
      </section>

      <form class="ticker-search" id="tickerSearch">
        <label for="tickerSearchInput">Pin a ticker</label>
        <div class="ticker-search-field">
          <input
            id="tickerSearchInput"
            type="search"
            list="tickerOptions"
            placeholder="Search NVDA, Apple, SPY…"
            autocomplete="off"
            aria-describedby="tickerSearchStatus"
          />
          <datalist id="tickerOptions"></datalist>
          <button type="submit">Pin</button>
        </div>
        <button class="back-btn" id="backBtn" type="button">Back to sectors</button>
        <span class="ticker-search-status" id="tickerSearchStatus" aria-live="polite"></span>
      </form>

      <section class="chart-shell">
        <div class="y-axis" id="yAxis"></div>
        <div class="chart" id="chart"></div>
      </section>

      <section class="replay-controls" aria-label="Market replay">
        <div class="replay-heading">
          <div>
            <div class="view-mode-toggle" aria-label="Chart mode">
              <button class="view-mode-btn active" id="liveModeBtn" type="button">Live</button>
              <button class="view-mode-btn" id="replay1dModeBtn" type="button">1D Replay</button>
              <button class="view-mode-btn" id="replay2dModeBtn" type="button">2D Replay</button>
              <button class="view-mode-btn" id="replay1wModeBtn" type="button">1W Replay</button>
              <button class="view-mode-btn" id="replay2wModeBtn" type="button">2W Replay</button>
              <button class="view-mode-btn" id="replayModeBtn" type="button">1M Replay</button>
              <button class="view-mode-btn" id="replay2mModeBtn" type="button">2M Replay</button>
              <button class="view-mode-btn" id="replay3mModeBtn" type="button">3M Replay</button>
              <button class="view-mode-btn" id="replay6mModeBtn" type="button">6M Replay</button>
            </div>
            <strong id="replayTimestamp">Daily closes</strong>
          </div>
          <span class="replay-status" id="replayStatus">Live market view</span>
        </div>
        <div class="replay-transport is-disabled" id="replayTransport">
          <button class="replay-play" id="replayPlay" type="button" aria-label="Play one month replay">
            <span id="replayPlayIcon">▶</span>
            <span id="replayPlayLabel">Play</span>
          </button>
          <input
            class="replay-scrubber"
            id="replayScrubber"
            type="range"
            min="0"
            max="0"
            value="0"
            step="1"
            aria-label="One month replay timeline"
          />
          <label class="replay-speed">
            Speed
            <select id="replaySpeed">
              <option value="1200">0.5×</option>
              <option value="700" selected>1×</option>
              <option value="350">2×</option>
            </select>
          </label>
          <button class="back-live" id="backLiveBtn" type="button">Back to Live</button>
        </div>
      </section>

      <footer class="footer">
        <button class="refresh" id="refresh">Refresh</button>
        <label class="toggle">
          <input type="checkbox" id="capToggle" checked />
          Scale by market cap
        </label>
        <div class="notes" id="notes"></div>
      </footer>
    </main>

    <div class="tooltip" id="tooltip"></div>

    <script src="/sp500ad/app.js"></script>
  </body>
</html>
